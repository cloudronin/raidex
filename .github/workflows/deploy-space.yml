name: Deploy Space to HuggingFace

# Pushes the space/ subdirectory to the cloudronin/raidex-space HF Space whenever it
# changes on main. Requires a repo secret HF_TOKEN (a HuggingFace write token
# with access to the Space). The app lives in space/ but HF Spaces expect files
# at the repo root, so we upload the folder contents via huggingface_hub rather
# than mirroring git history.

on:
  push:
    branches: [main]
    paths: ["space/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "huggingface_hub>=0.23"
      - name: Data-integrity gate (developers mapped · rank RAI-descending · Key Findings consistent)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python space/check_integrity.py   # exits non-zero -> deploy blocked, bad data never ships
      - name: Upload space/ to the HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          HfApi().upload_folder(
              folder_path="space",
              repo_id="cloudronin/raidex-space",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message=f"Sync from GitHub main ({os.environ.get('GITHUB_SHA','')[:7]})",
              ignore_patterns=[".venv/*", "__pycache__/*", "*.pyc", ".git/*"],
          )
          print("Synced space/ -> cloudronin/raidex-space Space")
          PY
